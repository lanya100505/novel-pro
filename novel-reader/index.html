<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在验证权限...</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; color: #334155; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 90%; }
        h2 { color: #ef4444; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { display: inline-block; margin-top: 1rem; padding: 0.8rem 1.5rem; background: #4f46e5; color: white; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="loading" class="card">
        <div class="spinner"></div>
        <p>正在连接主站验证身份...</p>
    </div>

    <div id="access-denied" class="card" style="display: none;">
        <h2>🚫 访问被拒绝</h2>
        <p>您尚未登录或登录已过期。<br>请前往主站登录后再次访问。</p>
        <a href="#" id="login-link">前往主站登录</a>
    </div>

    <script>
        // 配置：主站地址
        const determineMainSite = () => {
            const hostname = window.location.hostname;
            if (hostname.includes('505616.xyz')) return "https://novel-pro.505616.xyz";
            if (hostname.includes('zzsp.me')) return "https://novel-pro.zzsp.me";
            if (hostname.includes('620100.xyz')) return "https://www.620100.xyz"; // 新域名
            return "https://novel-pro.20100505.xyz"; 
        };
        const MAIN_SITE = determineMainSite();
        document.getElementById('login-link').href = MAIN_SITE;

        function checkAuth() {
            // 通过 iframe 向主站索要 token
            const iframe = document.createElement('iframe');
            iframe.src = `${MAIN_SITE}/auth.html`;
            iframe.style.display = 'none';
            document.body.appendChild(iframe);

            let timeout = setTimeout(() => {
                showDenied();
            }, 5000); 

            window.addEventListener('message', function(event) {
                if (event.origin !== new URL(MAIN_SITE).origin) return;
                
                if (event.data && event.data.token) {
                    clearTimeout(timeout);
                    // 验证成功，保存 Token
                    sessionStorage.setItem('reader_token', event.data.token);
                    window.location.replace('reader.html');
                } else {
                    showDenied();
                }
            });
        }

        function showDenied() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('access-denied').style.display = 'block';
        }

        checkAuth();
    </script>
</body>
</html>
